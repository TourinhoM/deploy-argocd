apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-dependency-track
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: system

  source:
    repoURL: https://dependencytrack.github.io/helm-charts
    chart: dependency-track
    targetRevision: 0.9.0
    helm:
      values: |
        apiserver:
          enabled: true
          persistentVolume:
            enabled: true
            size: 5Gi
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          env:
            - name: ALPINE_DATABASE_MODE
              value: external
            - name: ALPINE_DATABASE_URL
              value: "jdbc:postgresql://postgresql.infra.svc.cluster.local:5432/dtrack"
            - name: ALPINE_DATABASE_DRIVER
              value: org.postgresql.Driver
            - name: ALPINE_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dtrack-db-credentials
                  key: username
            - name: ALPINE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dtrack-db-credentials
                  key: password
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            hosts:
              - host: dtrack.local
                paths:
                  - path: /api
                    pathType: Prefix
            tls:
              - hosts:
                  - dtrack.local
                secretName: dtrack-tls

        frontend:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          env:
            - name: API_BASE_URL
              value: "https://dtrack.local"
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            hosts:
              - host: dtrack.local
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - dtrack.local
                secretName: dtrack-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: dtrack

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
