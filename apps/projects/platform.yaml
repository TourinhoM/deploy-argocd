apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Projeto base para infra/plataforma (GitOps)
  sourceRepos:
    - https://github.com/TourinhoM/deploy-keycloak.git
    - https://github.com/TourinhoM/deploy-prostgresql.git
    - https://github.com/TourinhoM/deploy-llm-runtime.git
  destinations:
    - namespace: keycloak
      server: https://kubernetes.default.svc
    - namespace: infra
      server: https://kubernetes.default.svc
    - namespace: ai
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

# TODO:
# - Quando ativar o ApplicationSet `infra` (hoje com CHANGE_ME_REPO_URL),
#   adicionar o repoURL real em sourceRepos.

