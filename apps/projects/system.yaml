apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: system
  namespace: argocd
spec:
  description: Componentes de plataforma do cluster (Argo CD self-management, External Secrets, Keycloak Operator)
  sourceRepos:
    - https://github.com/TourinhoM/deploy-argocd
    - https://charts.external-secrets.io
    - https://github.com/keycloak/keycloak-k8s-resources
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: keycloak
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
