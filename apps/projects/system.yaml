apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: system
  namespace: argocd
spec:
  description: Componentes de plataforma do cluster (Argo CD self-management, External Secrets, Keycloak Operator, cert-manager, trivy-operator)
  sourceRepos:
    - https://github.com/TourinhoM/deploy-argocd
    - https://github.com/TourinhoM/deploy-cert-manager
    - https://github.com/TourinhoM/deploy-trivy-operator
    - https://github.com/TourinhoM/deploy-dtrack
    - https://charts.external-secrets.io
    - https://charts.jetstack.io
    - https://aquasecurity.github.io/helm-charts/
    - https://github.com/keycloak/keycloak-k8s-resources
    - https://dependencytrack.github.io/helm-charts
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: keycloak
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: trivy-system
      server: https://kubernetes.default.svc
    - namespace: dtrack
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
