apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-cert-manager
  namespace: argocd
  annotations:
    # Wave 0 = chart + CRDs primeiro; Issuers/Certificates do
    # deploy-cert-manager vem em wave 1 (depois dos CRDs prontos).
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: system

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.18.2
    helm:
      values: |
        installCRDs: true
        replicaCount: 1
        webhook:
          replicaCount: 1
        cainjector:
          replicaCount: 1

        # Prometheus annotations + ServiceMonitor pra integrar com
        # kube-prometheus-stack (label release=monitoring no SM, ver
        # values doc do chart pra forma corrente).
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true
            labels:
              release: monitoring

        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
