apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-keycloak-dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/TourinhoM/deploy-keycloak.git
    targetRevision: main
    path: overlays/lab
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

