apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-trivy-operator-config
  namespace: argocd
  annotations:
    # Wave 1 — depende do CRD PrometheusRule (vem do kube-prometheus-stack
    # ja deployed) e dos CRDs/metricas do trivy-operator (wave 0).
    # Em pratica PrometheusRule nao depende dos CRDs do trivy — alerts
    # so disparam quando metricas surgirem — mas mantemos wave 1
    # consistente com o pattern cert-manager.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: system

  source:
    repoURL: https://github.com/TourinhoM/deploy-trivy-operator
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
