apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: monitoring

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 84.3.0
    helm:
      values: |
        alertmanager:
          enabled: true
          alertmanagerSpec:
            replicas: 1
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 1Gi
        grafana:
          enabled: true

          persistence:
            enabled: true
            type: pvc
            accessModes: ["ReadWriteOnce"]
            size: 2Gi

          ingress:
            enabled: true
            ingressClassName: traefik

            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure

            hosts:
              - grafana.local

            tls:
              - hosts:
                  - grafana.local
                secretName: keycloak-tls
        prometheus:
          service:
            type: ClusterIP
            port: 9090
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            hosts:
              - prometheus.local
            tls:
              - secretName: keycloak-tls
                hosts:
                  - prometheus.local
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        prometheus-node-exporter:
          enabled: true
          hostRootFsMount:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true