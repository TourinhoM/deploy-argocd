apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-ollama-dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/TourinhoM/deploy-llm-runtime.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
