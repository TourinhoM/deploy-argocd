apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds-github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: argocd-repo-creds-github
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: "https://github.com/TourinhoM"
        githubAppID: "{{ .appId }}"
        githubAppInstallationID: "{{ .installationId }}"
        githubAppPrivateKey: "{{ .privateKey }}"
  data:
    - secretKey: appId
      remoteRef:
        key: cluster/argocd
        property: github_app_id
    - secretKey: installationId
      remoteRef:
        key: cluster/argocd
        property: github_app_installation_id
    - secretKey: privateKey
      remoteRef:
        key: cluster/argocd
        property: github_app_private_key
