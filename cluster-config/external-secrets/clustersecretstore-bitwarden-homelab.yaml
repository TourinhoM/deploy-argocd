apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-homelab
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: http://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      organizationID: 2fb304f5-fb38-4817-9c0a-b43a0119fd90
      projectID: cd00529c-adef-41f2-8390-b43b0023aee8
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token
            namespace: external-secrets
            key: token
