# Polaris config pro deploy-argocd. Auto-detectado pela action `polaris`
# do org-ci-platform via $GITHUB_WORKSPACE/polaris.yaml.
#
# Filosofia: Polaris vem com checks production-grade pra clusters
# multi-node. Checks abaixo nao aplicam ao homelab single-node WSL OU
# sao decisoes conscientes de scope — desativados aqui pra reduzir
# ruido sem comprometer findings de security/reliability reais.
#
# Per-resource exemptions (RBAC danger findings) ficam em
# bootstrap/argocd/polaris-rbac-exempt-patch.yaml via annotation.

checks:
  # --- Out-of-scope: homelab single-node WSL ---
  priorityClassNotSet: ignore         # 1 no, sem competicao por scheduling
  topologySpreadConstraint: ignore    # 1 no, sem topologia pra spread
  missingPodDisruptionBudget: ignore  # replicas: 1, PDB seria no-op
  missingNetworkPolicy: ignore        # k3s default sem CNI policy enforcement
  deploymentMissingReplicas: ignore   # replicas: 1 intencional pra economia de RAM

  # --- Decisoes conscientes ---
  automountServiceAccountToken: ignore  # componentes Argo CD precisam de API access
  metadataAndInstanceMismatched: ignore # convencao app.kubernetes.io/instance que upstream Argo CD nao segue
