# Strategic merge patches contra argo-cd v2.11.7/manifests/install.yaml.
#
# Objetivos:
#   1. Definir resources.requests/limits em todos os containers (cluster homelab WSL).
#   2. Declarar a porta 9001 do notifications-controller (resolve liveness-port
#      false-positive do kube-linter — Argo CD nao declara a porta no spec mas
#      a probe aponta pra ela).
#   3. Adicionar Pod-level securityContext (runAsNonRoot + seccompProfile
#      RuntimeDefault) nos 5 workloads que upstream nao seta — resolve trivy-k8s
#      KSV-0118. Containers ja tem securityContext proprio no upstream; aqui
#      garantimos que o Pod-level reforca a baseline.
#
# Sem CPU limits intencionalmente: CPU throttling sob limit gera latencia
# desnecessaria (best practice atual — ver discussao Tim Hockin/SIG-Node).
#
# Pod-level securityContext NAO eh adicionado em redis/notifications-controller
# pois trivy nao flagou — provavelmente upstream ja seta para esses dois.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-applicationset-controller
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copyutil
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      containers:
        - name: dex
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-notifications-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-notifications-controller
          # Porta 9001 (metrics/health) declarada pra alinhar com a livenessProbe.
          ports:
            - name: metrics
              containerPort: 9001
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
spec:
  template:
    spec:
      initContainers:
        - name: secret-init
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      containers:
        - name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copyutil
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      containers:
        - name: argocd-repo-server
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-server
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-application-controller
          # Reconcile loop pesado — request/limit mais agressivos que demais.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
