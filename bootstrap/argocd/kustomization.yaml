apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bootstrap padrão completo via manifests oficiais do Argo CD.
# A versão está pinada para manter reprodutibilidade.

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.11.7/manifests/install.yaml
  - ingress.yaml

patches:
  - path: argocd-cmd-params-cm-patch.yaml
  - path: resources-patch.yaml

